<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AVTX — Asistente Facu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --olive-dark: #3A3D2E;
    --olive-mid:  #5A6147;
    --olive-light:#8A9472;
    --lime:       #B8D432;
    --lime-dim:   #8EA020;
    --sand:       #F0ECD8;
    --sand-light: #F8F5EC;
    --black:      #1A1C14;
    --white:      #FFFFFF;
    --gray-muted: #6B6D5E;
    --border:     rgba(90,97,71,0.18);
    --msg-bot-bg: #EDEEE4;
    --msg-user-bg:#3A3D2E;
    --font: 'Space Grotesk', sans-serif;
    --radius: 14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font);background:var(--sand-light);color:var(--black);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;max-width:780px;margin:0 auto;background:var(--white);border-left:1px solid var(--border);border-right:1px solid var(--border)}
  #header{background:var(--black);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  #header-brand{display:flex;align-items:center;gap:10px}
  #logo{width:32px;height:32px;background:var(--lime);display:flex;align-items:center;justify-content:center;border-radius:6px}
  #logo span{font-size:10px;font-weight:700;color:var(--black);letter-spacing:-0.5px;line-height:1.1;text-align:center}
  #brand-name{font-size:15px;font-weight:600;color:var(--white);letter-spacing:0.5px}
  #brand-sub{font-size:11px;font-weight:400;color:var(--olive-light)}
  #status-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--lime)}
  #status-dot::before{content:'';width:7px;height:7px;background:var(--lime);border-radius:50%;animation:pulse-dot 2s ease-in-out infinite}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
  #quick-bar{background:var(--olive-dark);padding:8px 24px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
  #quick-bar::-webkit-scrollbar{display:none}
  .qchip{background:rgba(184,212,50,.12);border:1px solid rgba(184,212,50,.25);color:var(--lime);font-family:var(--font);font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;white-space:nowrap;cursor:pointer;transition:background .15s,border-color .15s}
  .qchip:hover{background:rgba(184,212,50,.22);border-color:rgba(184,212,50,.5)}
  #chat{flex:1;overflow-y:auto;padding:24px 24px 8px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  .msg-row{display:flex;align-items:flex-end;gap:10px;animation:msg-in .2s ease-out}
  @keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-row.user{flex-direction:row-reverse}
  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .avatar.bot{background:var(--olive-dark);color:var(--lime)}
  .avatar.user{background:var(--lime);color:var(--black)}
  .bubble{max-width:72%;padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.55}
  .msg-row.bot .bubble{background:var(--msg-bot-bg);color:var(--black);border-bottom-left-radius:4px}
  .msg-row.user .bubble{background:var(--msg-user-bg);color:var(--sand);border-bottom-right-radius:4px}
  .bubble pre{font-size:12px;background:rgba(0,0,0,.06);border-radius:6px;padding:10px;margin-top:8px;overflow-x:auto;white-space:pre-wrap}
  .opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .opt-btn{background:var(--white);border:1.5px solid var(--lime-dim);color:var(--olive-dark);font-family:var(--font);font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;cursor:pointer;transition:background .15s,color .15s}
  .opt-btn:hover{background:var(--lime);color:var(--black);border-color:var(--lime)}
  .opt-btn:disabled{opacity:.4;cursor:default}
  #typing-row{padding:0 24px 12px;display:none;align-items:flex-end;gap:10px}
  #typing-row.visible{display:flex}
  .dot-row{display:flex;gap:5px;align-items:center}
  .dot-row span{width:6px;height:6px;background:var(--olive-mid);border-radius:50%;animation:dot-bounce 1.2s ease-in-out infinite}
  .dot-row span:nth-child(2){animation-delay:.2s}
  .dot-row span:nth-child(3){animation-delay:.4s}
  @keyframes dot-bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
  #input-area{flex-shrink:0;padding:16px 24px 20px;border-top:1px solid var(--border);background:var(--white)}
  #input-row{display:flex;gap:10px;align-items:flex-end;background:var(--sand-light);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;transition:border-color .15s}
  #input-row:focus-within{border-color:var(--olive-mid)}
  #msg-input{flex:1;background:none;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--black);resize:none;max-height:120px;line-height:1.5}
  #msg-input::placeholder{color:var(--gray-muted)}
  #send-btn{width:36px;height:36px;background:var(--olive-dark);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  #send-btn:hover{background:var(--olive-mid)}
  #send-btn:disabled{background:var(--border);cursor:default}
  #send-btn svg{width:16px;height:16px;fill:none;stroke:var(--white);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #hint{margin-top:8px;font-size:11px;color:var(--gray-muted);text-align:center}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-brand">
      <div id="logo"><span>AV<br>TX</span></div>
      <div>
        <div id="brand-name">ASISTENTE FACU</div>
        <div id="brand-sub">Avíos Textiles Argentina</div>
      </div>
    </div>
    <div id="status-dot">Conectado</div>
  </div>
  <div id="chat">
    <div class="msg-row bot">
      <div class="avatar bot">AV</div>
      <div class="bubble">
        Hola, soy Facu. Contame qué necesitás.
      </div>
    </div>
  </div>
  <div id="typing-row">
    <div class="avatar bot">AV</div>
    <div class="bubble" style="background:var(--msg-bot-bg);padding:14px 18px">
      <div class="dot-row"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" rows="1" placeholder="Escribí tu consulta o acción…" maxlength="800"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div id="hint">Enter para enviar · Shift+Enter para nueva línea</div>
  </div>
</div>
<script>
const chat=document.getElementById('chat');
const input=document.getElementById('msg-input');
const typingRow=document.getElementById('typing-row');
const sendBtn=document.getElementById('send-btn');
let sessionId=null,busy=false;
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!busy)sendMessage()}});
function sendChip(t){input.value=t;sendMessage()}
function selectOpt(btn){
  const enc=btn.getAttribute('data-opt')||'';
  const t=enc?decodeURIComponent(enc):'';
  if(!t)return;
  btn.closest('.opts').querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  addUserMsg(t);
  callAgent(t);
}
function sendMessage(){const t=input.value.trim();if(!t||busy)return;input.value='';input.style.height='auto';addUserMsg(t);callAgent(t)}
function addUserMsg(t){const r=document.createElement('div');r.className='msg-row user';r.innerHTML=`<div class="avatar user">VOS</div><div class="bubble">${esc(t)}</div>`;chat.appendChild(r);scrollBot()}
function addBotMsg(reply,options){
  const r=document.createElement('div');r.className='msg-row bot';
  let optsHtml='';
  if(options&&options.length){
    optsHtml='<div class="opts">'+options.map((o) => {
      const t=String(o);
      const enc=encodeURIComponent(t);
      return '<button type="button" class="opt-btn" data-opt="'+enc+'" onclick="selectOpt(this)">'+esc(t)+'</button>';
    }).join('')+'</div>';
  }
  const body=`<span>${fmt(reply)}</span>`;
  r.innerHTML=`<div class="avatar bot">AV</div><div class="bubble">${body}${optsHtml}</div>`;
  chat.appendChild(r);scrollBot()
}
function fmt(t){
  const base=esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  return base
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|\s)(\/propuestas\/[A-Za-z0-9._\/-]+\.pdf)(?=\s|$|<br>)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function scrollBot(){setTimeout(()=>chat.scrollTop=chat.scrollHeight,50)}
function showTyping(){typingRow.classList.add('visible');scrollBot()}
function hideTyping(){typingRow.classList.remove('visible')}
async function callAgent(text){
  busy=true;sendBtn.disabled=true;showTyping();
  try{
    const res=await fetch('/api/agent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,sessionId})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Error del servidor');
    sessionId=data.sessionId||sessionId;
    hideTyping();
    if(data.type==='clarification_form'){
      addBotMsg(data.message||data.reply||'No entendí bien qué querés hacer.',data.options||[]);
    }else{
      addBotMsg(data.reply||'(sin respuesta)',data.options||[]);
    }
  }catch(err){
    hideTyping();
    addBotMsg('Ocurrió un error. Intentá nuevamente.',[]);
    console.error(err);
  }finally{
    busy=false;sendBtn.disabled=false;input.focus();
  }
}
</script>
</body>
</html>
